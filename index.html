<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ColPali — Motor de Vectorización</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
  --accent:#6c63ff;--accent2:#a78bfa;--green:#22c55e;--red:#ef4444;
  --yellow:#f59e0b;--text:#e2e8f0;--muted:#7c85a2;--radius:12px;
  --shadow:0 4px 24px rgba(0,0,0,.45);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
.logo svg{color:var(--accent2)}
.pill{font-size:11px;font-weight:600;padding:2px 10px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:6px;transition:background .3s}
#status-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
#status-dot.err{background:var(--red);box-shadow:0 0 6px var(--red)}
#status-label{font-size:12px;color:var(--muted)}

/* Tabs */
.tabs{display:flex;padding:0 32px;border-bottom:1px solid var(--border);background:var(--surface)}
.tab-btn{padding:14px 24px;border:none;background:transparent;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent2)}
.tab-btn:hover:not(.active){color:var(--text)}

/* Panels */
.panel{display:none;padding:32px;max-width:960px;margin:0 auto}
.panel.active{display:block}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:16px}

/* Form */
label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
select,input[type="text"],input[type="number"],textarea{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
select:focus,input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px;font-family:inherit}
.field{margin-bottom:16px}

/* Drop zone */
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:36px 24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(108,99,255,.06)}
.drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:32px;margin-bottom:8px}
.drop-label{color:var(--muted);font-size:13px}
.drop-label strong{color:var(--accent2)}
.file-name{margin-top:10px;font-size:13px;color:var(--text);background:var(--surface2);border-radius:6px;padding:6px 12px;display:none}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){opacity:.85}

/* Progress */
.progress-wrap{margin-top:16px;display:none}
.progress-bar{height:6px;border-radius:99px;background:var(--surface2);overflow:hidden}
.progress-fill{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{filter:brightness(1)}50%{filter:brightness(1.3)}100%{filter:brightness(1)}}
.progress-label{font-size:12px;color:var(--muted);margin-top:6px}

/* Alert */
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-top:16px;display:none;line-height:1.5}
.alert.success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#86efac}
.alert.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5}

/* Stats chips */
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.stat-chip{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:13px}
.stat-chip span{color:var(--muted);font-size:11px;display:block}

/* Search mode toggle */
.search-mode{display:flex;gap:8px;margin-bottom:20px}
.mode-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* LLM Answer box */
.answer-box{
  background:linear-gradient(135deg,rgba(108,99,255,.08),rgba(167,139,250,.05));
  border:1px solid rgba(108,99,255,.35);
  border-radius:var(--radius);
  padding:24px;
  margin-bottom:24px;
  animation:fadeUp .3s ease;
}
.answer-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.answer-header .icon{font-size:20px}
.answer-header .title{font-size:15px;font-weight:700;color:var(--accent2)}
.provider-badge{
  margin-left:auto;font-size:11px;font-weight:600;padding:3px 10px;
  border-radius:99px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);
}
.provider-badge.gpt{border-color:rgba(34,197,94,.4);color:#86efac}
.provider-badge.gemini{border-color:rgba(245,158,11,.4);color:#fcd34d}
.answer-text{font-size:14px;line-height:1.75;color:var(--text);white-space:pre-wrap}
.answer-thinking{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px}

/* Results grid */
.results-section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;margin-top:8px}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .35s ease both}
.result-card:nth-child(2){animation-delay:.08s}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-img-wrap{background:#000;position:relative;max-height:480px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.result-img-wrap img{width:100%;display:block;object-fit:contain;max-height:480px}
.rank-badge{position:absolute;top:10px;left:10px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
.score-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.65);color:#fff;font-size:11px;font-weight:600;backdrop-filter:blur(4px);padding:3px 10px;border-radius:99px}
.result-meta{padding:14px 16px;border-top:1px solid var(--border)}
.result-meta .file-info{font-size:13px;font-weight:600;margin-bottom:4px}
.result-meta .page-info{font-size:12px;color:var(--muted)}
.score-bar-bg{height:4px;border-radius:99px;background:var(--surface2);overflow:hidden;margin-top:8px}
.score-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s ease}

/* Empty / loading */
.empty-state{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Image preview */
#img-preview-wrap{display:none;margin-top:12px}
#img-preview{max-height:180px;border-radius:8px;border:1px solid var(--border);display:block}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
    </svg>
    ColPali Vector Engine
    <span class="pill">v1.1</span>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span id="status-dot"></span>
    <span id="status-label">Verificando…</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('index')">📄 Vectorización</button>
  <button class="tab-btn"       onclick="switchTab('search')">🔍 Búsqueda</button>
</nav>

<!-- ═══ PANEL VECTORIZACIÓN ════════════════════════════════════════════════ -->
<div id="panel-index" class="panel active">
  <div class="card">
    <div class="card-title">Configuración</div>
    <div class="field">
      <label>Colección destino</label>
      <select id="idx-collection"><option value="">Cargando…</option></select>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Archivo PDF</div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="pdf-input" accept=".pdf"/>
      <div class="drop-icon">📂</div>
      <div class="drop-label">Arrastra tu PDF aquí o <strong>haz clic para seleccionar</strong></div>
      <div class="file-name" id="file-name-label"></div>
    </div>
    <div class="progress-wrap" id="idx-progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="idx-progress-fill"></div></div>
      <div class="progress-label" id="idx-progress-label">Procesando…</div>
    </div>
    <div class="alert" id="idx-alert"></div>
    <div style="margin-top:20px">
      <button class="btn btn-primary" id="idx-btn" onclick="startIndexing()" disabled>
        <span id="idx-btn-inner">⚡ Vectorizar e Insertar</span>
      </button>
    </div>
    <div class="stats" id="idx-stats"></div>
  </div>
</div>

<!-- ═══ PANEL BÚSQUEDA ═════════════════════════════════════════════════════ -->
<div id="panel-search" class="panel">
  <div class="card">
    <div class="card-title">Configuración</div>
    <div class="field">
      <label>Colección</label>
      <select id="srch-collection"><option value="">Cargando…</option></select>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Tipo de búsqueda</div>
    <div class="search-mode">
      <button class="mode-btn active" id="mode-text-btn" onclick="setMode('text')">💬 Por texto</button>
      <button class="mode-btn"        id="mode-img-btn"  onclick="setMode('image')">🖼️ Por imagen</button>
    </div>

    <!-- Texto -->
    <div id="input-text">
      <div class="field">
        <label>Pregunta / Consulta</label>
        <textarea id="srch-query" placeholder="Ej: ¿Cuáles son los resultados a nivel nacional?" rows="3"></textarea>
      </div>
    </div>

    <!-- Imagen -->
    <div id="input-image" style="display:none">
      <div class="drop-zone" id="img-drop-zone">
        <input type="file" id="img-input" accept="image/*" onchange="previewImage(this)"/>
        <div class="drop-icon">🖼️</div>
        <div class="drop-label">Arrastra una imagen o <strong>haz clic para seleccionar</strong></div>
      </div>
      <div id="img-preview-wrap"><img id="img-preview" src="" alt="Preview"/></div>
    </div>

    <div class="alert" id="srch-alert"></div>
    <div style="margin-top:16px">
      <button class="btn btn-primary" id="srch-btn" onclick="runSearch()">
        <span id="srch-btn-inner">🔍 Buscar</span>
      </button>
    </div>
  </div>

  <!-- Resultados -->
  <div id="results-section">
    <div class="empty-state">
      <div class="icon">🔎</div>
      <div>Realiza una búsqueda para ver los resultados</div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let searchMode = 'text';

window.addEventListener('DOMContentLoaded', () => {
  checkHealth();
  loadCollections();
  setupDrop();
});

// ── Health ───────────────────────────────────────────────────────────────────
async function checkHealth() {
  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('status-label');
  try {
    const r = await fetch(`${API}/health`);
    if (r.ok) {
      dot.className = 'ok';
      const d = await r.json();
      lbl.textContent = `Servicio activo · ${d.model ?? ''}`;
    } else throw new Error();
  } catch {
    dot.className = 'err';
    lbl.textContent = 'Sin conexión con el servidor';
  }
}

// ── Colecciones ───────────────────────────────────────────────────────────────
async function loadCollections() {
  try {
    const r = await fetch(`${API}/api/collections`);
    const list = await r.json();
    ['idx-collection','srch-collection'].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = list.length
        ? list.map(c => `<option value="${c}">${c}</option>`).join('')
        : '<option value="">— Sin colecciones —</option>';
    });
  } catch {
    ['idx-collection','srch-collection'].forEach(id => {
      document.getElementById(id).innerHTML = '<option value="">Error al cargar</option>';
    });
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', (i===0)===(tab==='index'))
  );
  document.getElementById('panel-index').classList.toggle('active', tab==='index');
  document.getElementById('panel-search').classList.toggle('active', tab==='search');
}

// ── Drop PDF ──────────────────────────────────────────────────────────────────
function setupDrop() {
  const zone = document.getElementById('drop-zone');
  const input = document.getElementById('pdf-input');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.pdf')) setFile(f);
  });
  input.addEventListener('change', () => { if (input.files[0]) setFile(input.files[0]); });
}
function setFile(file) {
  const lbl = document.getElementById('file-name-label');
  lbl.textContent = `📄 ${file.name}  (${(file.size/1024/1024).toFixed(2)} MB)`;
  lbl.style.display = 'block';
  document.getElementById('idx-btn').disabled = false;
  hideAlert('idx-alert');
  document.getElementById('idx-stats').innerHTML = '';
}

// ── Vectorización ─────────────────────────────────────────────────────────────
async function startIndexing() {
  const file = document.getElementById('pdf-input').files[0];
  const coll = document.getElementById('idx-collection').value;
  if (!file) return showAlert('idx-alert','Selecciona un PDF primero.','error');
  if (!coll) return showAlert('idx-alert','Selecciona una colección.','error');

  setIdxLoading(true); hideAlert('idx-alert'); showProgress(true,'Subiendo y procesando PDF…');
  const form = new FormData();
  form.append('file', file);
  form.append('collection_name', coll);
  try {
    const r = await fetch(`${API}/api/index`, { method:'POST', body:form });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail ?? 'Error desconocido');
    showProgress(false);
    showAlert('idx-alert',
      `✅ ${d.pages_indexed} páginas insertadas en <strong>${d.collection}</strong> en ${d.elapsed_seconds}s`,
      'success');
    document.getElementById('idx-stats').innerHTML = `
      <div class="stat-chip"><span>Páginas</span>${d.pages_indexed}</div>
      <div class="stat-chip"><span>Tiempo</span>${d.elapsed_seconds}s</div>
      <div class="stat-chip"><span>Colección</span>${d.collection}</div>
      <div class="stat-chip"><span>Archivo</span>${d.filename}</div>`;
    loadCollections();
  } catch(err) {
    showProgress(false);
    showAlert('idx-alert',`❌ ${err.message}`,'error');
  } finally { setIdxLoading(false); }
}
function setIdxLoading(on) {
  document.getElementById('idx-btn').disabled = on;
  document.getElementById('idx-btn-inner').innerHTML = on
    ? `<span class="spinner"></span> Procesando…` : '⚡ Vectorizar e Insertar';
}
function showProgress(on, label='') {
  document.getElementById('idx-progress-wrap').style.display = on ? 'block' : 'none';
  document.getElementById('idx-progress-fill').style.width = on ? '100%' : '0%';
  document.getElementById('idx-progress-label').textContent = label;
}

// ── Modo búsqueda ─────────────────────────────────────────────────────────────
function setMode(mode) {
  searchMode = mode;
  document.getElementById('mode-text-btn').classList.toggle('active', mode==='text');
  document.getElementById('mode-img-btn').classList.toggle('active',  mode==='image');
  document.getElementById('input-text').style.display  = mode==='text'  ? '' : 'none';
  document.getElementById('input-image').style.display = mode==='image' ? '' : 'none';
  hideAlert('srch-alert');
}
function previewImage(input) {
  const wrap = document.getElementById('img-preview-wrap');
  const prev = document.getElementById('img-preview');
  if (input.files[0]) { prev.src = URL.createObjectURL(input.files[0]); wrap.style.display='block'; }
}

// ── Búsqueda ──────────────────────────────────────────────────────────────────
async function runSearch() {
  const coll = document.getElementById('srch-collection').value;
  if (!coll) return showAlert('srch-alert','Selecciona una colección.','error');

  hideAlert('srch-alert');
  setSrchLoading(true);
  showResultsLoading();

  try {
    let data;

    if (searchMode === 'text') {
      // ── Flujo completo: busqueda + respuesta LLM ──────────────────────────
      const query = document.getElementById('srch-query').value.trim();
      if (!query) { setSrchLoading(false); return showAlert('srch-alert','Escribe una consulta.','error'); }

      // Mostrar estado "analizando con IA"
      showAnswerThinking();

      const form = new FormData();
      form.append('query', query);
      form.append('collection_name', coll);
      form.append('limit', 2);
      const r = await fetch(`${API}/api/search/answer`, { method:'POST', body:form });
      data = await r.json();
      if (!r.ok) throw new Error(data.detail ?? 'Error en la búsqueda');

      renderAnswerAndResults(data);

    } else {
      // ── Solo busqueda por imagen (sin LLM) ───────────────────────────────
      const file = document.getElementById('img-input').files[0];
      if (!file) { setSrchLoading(false); return showAlert('srch-alert','Selecciona una imagen.','error'); }

      const form = new FormData();
      form.append('file', file);
      form.append('collection_name', coll);
      form.append('limit', 2);
      const r = await fetch(`${API}/api/search/image`, { method:'POST', body:form });
      data = await r.json();
      if (!r.ok) throw new Error(data.detail ?? 'Error en la búsqueda');

      renderImageResults(data.results);
    }

  } catch(err) {
    showResultsEmpty();
    showAlert('srch-alert', `❌ ${err.message}`, 'error');
  } finally {
    setSrchLoading(false);
  }
}

function setSrchLoading(on) {
  document.getElementById('srch-btn').disabled = on;
  document.getElementById('srch-btn-inner').innerHTML = on
    ? `<span class="spinner"></span> Buscando…` : '🔍 Buscar';
}

// ── Render: texto → respuesta LLM + imágenes referencia ──────────────────────
function renderAnswerAndResults(data) {
  const section = document.getElementById('results-section');

  const providerLabel = data.provider === 'gpt'    ? 'GPT-4o-mini'
                      : data.provider === 'gemini' ? 'Gemini 2.5 Flash'
                      : '';
  const providerClass = data.provider ?? '';

  const answerHtml = data.answer
    ? `<div class="answer-box">
        <div class="answer-header">
          <span class="icon">🤖</span>
          <span class="title">Respuesta</span>
          ${providerLabel ? `<span class="provider-badge ${providerClass}">${providerLabel}</span>` : ''}
        </div>
        <div class="answer-text">${escHtml(data.answer)}</div>
       </div>`
    : data.error
    ? `<div class="alert error" style="display:block;margin-bottom:20px">⚠️ LLM no disponible: ${escHtml(data.error)}</div>`
    : '';

  const cardsHtml = buildResultCards(data.results ?? []);

  section.innerHTML = answerHtml + `
    <div class="results-section-title">📄 Páginas de referencia</div>
    <div class="results-grid">${cardsHtml}</div>`;
}

// ── Render: imagen → solo cards ───────────────────────────────────────────────
function renderImageResults(results) {
  const section = document.getElementById('results-section');
  if (!results || results.length === 0) {
    section.innerHTML = `<div class="empty-state"><div class="icon">😕</div><div>No se encontraron resultados</div></div>`;
    return;
  }
  section.innerHTML = `<div class="results-grid">${buildResultCards(results)}</div>`;
}

function buildResultCards(results) {
  return results.slice(0,2).map((r,i) => {
    const score    = (r.score ?? 0).toFixed(4);
    const scorePct = Math.min(100, Math.round((r.score ?? 0) * 100));
    const imgSrc   = r.image_base64 ? `data:image/png;base64,${r.image_base64}` : '';
    return `
      <div class="result-card">
        <div class="result-img-wrap">
          ${imgSrc
            ? `<img src="${imgSrc}" alt="Página ${r.page_number}" loading="lazy"/>`
            : `<div style="padding:60px;color:var(--muted);text-align:center">Sin imagen</div>`}
          <div class="rank-badge">#${i+1}</div>
          <div class="score-badge">Score: ${score}</div>
        </div>
        <div class="result-meta">
          <div class="file-info">📄 ${escHtml(r.source_file ?? r.image_name ?? 'Desconocido')}</div>
          <div class="page-info">Página ${r.page_number ?? '—'} de ${r.total_pages ?? '—'}</div>
          <div class="score-bar-bg"><div class="score-bar-fill" style="width:${scorePct}%"></div></div>
        </div>
      </div>`;
  }).join('');
}

// ── Estados de carga ──────────────────────────────────────────────────────────
function showAnswerThinking() {
  document.getElementById('results-section').innerHTML = `
    <div class="answer-box">
      <div class="answer-thinking">
        <span class="spinner"></span>
        Buscando páginas relevantes y generando respuesta con IA…
      </div>
    </div>`;
}
function showResultsLoading() {
  document.getElementById('results-section').innerHTML = `
    <div class="empty-state">
      <span class="spinner" style="width:32px;height:32px;border-width:3px"></span>
      <div style="margin-top:16px">Buscando páginas relevantes…</div>
    </div>`;
}
function showResultsEmpty() {
  document.getElementById('results-section').innerHTML = `
    <div class="empty-state"><div class="icon">🔎</div><div>Realiza una búsqueda para ver los resultados</div></div>`;
}

// ── Alertas ───────────────────────────────────────────────────────────────────
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.innerHTML = msg; el.className = `alert ${type}`; el.style.display = 'block';
}
function hideAlert(id) { document.getElementById(id).style.display = 'none'; }

// ── Utilidades ────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
